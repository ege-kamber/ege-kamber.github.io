# Site Settings
locale: "en-US"
title: "Ege Kamber"
title_separator: "-"
name: &name "Ege Kamber"
description: &description "Developmental Psychologist | Postdoctoral Visitor at York University"
url: https://ege-kamber.github.io
baseurl: ""
repository: "egekmbr/ege-kamber.github.io"

# Site Author
author:
  name: "Ege Kamber"
  avatar: "profile.jpg"
  bio: "Postdoctoral Visitor at York University. I study future-oriented cognition, episodic memory, saving, and procrastination in childhood."
  location: "Toronto, ON, Canada"
  employer: "York University"
  email: "ekamber@yorku.ca"
  linkedin: "egekamber"
  googlescholar: "https://scholar.google.ca/citations?user=hkEi5G0AAAAJ"
  orcid: "https://orcid.org/0000-0002-1365-8667"
  osf: "https://osf.io/3eysr/"

# Reading Files
include:
  - .htaccess
  - _pages
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      read_time: false
      share: false
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: false
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: America/Toronto

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

# Markdown Processing
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  toc_levels: 1..6
